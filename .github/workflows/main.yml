---

name: "Main"
run-name: "CI · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: postfix
            context: ./postfix
            file: postfix/Dockerfile
          - name: certbot
            context: ./certbot
            file: certbot/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Build Metadata
        id: meta
        run: |
          {
            echo "image_version=0.0.0-sha.${GITHUB_SHA::7}"
            echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          build-args: |
            VERSION=${{ steps.meta.outputs.image_version }}
            MAINTAINER=${{ github.actor }}
            IMAGE_REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
