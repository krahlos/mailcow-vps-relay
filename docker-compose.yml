services:
  postfix:
    build: ./postfix
    container_name: mailcow-vps-relay-postfix
    restart: unless-stopped
    env_file: .env
    ports:
      - "0.0.0.0:25:25"
      - "[::]:25:25"
    volumes:
      - ./postfix/transport.tmpl:/etc/postfix/transport.tmpl:ro
      - ./postfix/helo_access.tmpl:/etc/postfix/helo_access.tmpl:ro
      - ./postfix/header_checks:/etc/postfix/header_checks:ro
      - letsencrypt:/etc/letsencrypt:ro
      - postfix-queue:/var/spool/postfix
      - postfix-logs:/var/log/postfix
    depends_on:
      certbot:
        condition: service_healthy

  certbot:
    image: certbot/certbot:v5.5.0
    container_name: mailcow-vps-relay-certbot
    restart: unless-stopped
    env_file: .env
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./certbot/renew.sh:/renew.sh:ro
    entrypoint: ["/bin/sh", "/renew.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/letsencrypt/live/$${RELAY_HOSTNAME}/fullchain.pem"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  postfix-exporter:
    image: ghcr.io/hsn723/postfix_exporter:0.19.0
    container_name: mailcow-vps-relay-postfix-exporter
    restart: unless-stopped
    command:
      - --postfix.logfile_path=/var/log/postfix/mail.log
      - --postfix.showq_path=/var/spool/postfix/public/showq
    ports:
      # Bind to localhost — firewall or VPN recommended before exposing externally
      - "127.0.0.1:9154:9154"
    volumes:
      - postfix-logs:/var/log/postfix:ro
      - postfix-queue:/var/spool/postfix:ro
    depends_on:
      - postfix

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:dead:beef::/64

volumes:
  postfix-queue:
    name: mailcow-vps-relay-postfix-queue
  postfix-logs:
    name: mailcow-vps-relay-postfix-logs
  letsencrypt:
    name: mailcow-vps-relay-letsencrypt
